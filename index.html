<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Savell Sketches</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
}

video{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
}

#overlay{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
touch-action:none;
max-width:80%;
}

#controls{

position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
background:rgba(255,255,255,.9);
padding:12px;
border-radius:12px;
text-align:center;

}

button{

margin:4px;
padding:6px;

}

#projectList{

position:fixed;
top:10px;
left:10px;
background:white;
padding:10px;
border-radius:10px;
max-height:200px;
overflow:auto;

}

</style>

</head>

<body>

<video id="camera" autoplay playsinline></video>

<img id="overlay">

<canvas id="canvas" style="display:none"></canvas>

<div id="controls">

<input type="file" id="upload">

<br>

Opacity

<input type="range" id="opacity" min="0" max="1" step="0.01" value="0.5">

<br>

<button onclick="makeOutline()">Outline</button>
<button onclick="toggleLock()">Lock Surface</button>

<br>

<button onclick="saveProject()">Save</button>
<button onclick="showProjects()">My Projects</button>

</div>

<div id="projectList"></div>

<script>

const video=document.getElementById("camera")
const overlay=document.getElementById("overlay")

navigator.mediaDevices.getUserMedia({

video:{facingMode:"environment"}

})

.then(stream=>{

video.srcObject=stream

})

document.getElementById("upload").onchange=e=>{

const file=e.target.files[0]

overlay.src=URL.createObjectURL(file)

}

document.getElementById("opacity").oninput=e=>{

overlay.style.opacity=e.target.value

}

let posX=0
let posY=0
let scale=1
let rotation=0

let startX
let startY

let initialDistance=0
let initialAngle=0

overlay.addEventListener("touchstart",e=>{

if(e.touches.length===1){

startX=e.touches[0].clientX-posX
startY=e.touches[0].clientY-posY

}

if(e.touches.length===2){

initialDistance=getDistance(e)
initialAngle=getAngle(e)

}

})

overlay.addEventListener("touchmove",e=>{

e.preventDefault()

if(e.touches.length===1){

posX=e.touches[0].clientX-startX
posY=e.touches[0].clientY-startY

}

if(e.touches.length===2){

let newDistance=getDistance(e)

scale*=newDistance/initialDistance

initialDistance=newDistance

let newAngle=getAngle(e)

rotation+=newAngle-initialAngle

initialAngle=newAngle

}

updateTransform()

})

function updateTransform(){

overlay.style.transform=
`translate(-50%,-50%) translate(${posX}px,${posY}px) scale(${scale}) rotate(${rotation}rad)`

}

function getDistance(e){

let dx=e.touches[0].clientX-e.touches[1].clientX
let dy=e.touches[0].clientY-e.touches[1].clientY

return Math.sqrt(dx*dx+dy*dy)

}

function getAngle(e){

let dx=e.touches[1].clientX-e.touches[0].clientX
let dy=e.touches[1].clientY-e.touches[0].clientY

return Math.atan2(dy,dx)

}

function makeOutline(){

const img=overlay
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=img.naturalWidth
canvas.height=img.naturalHeight

ctx.drawImage(img,0,0)

let imageData=ctx.getImageData(0,0,canvas.width,canvas.height)

let data=imageData.data

for(let i=0;i<data.length;i+=4){

let r=data[i]
let g=data[i+1]
let b=data[i+2]

let brightness=(r+g+b)/3

let edge=brightness<120?0:255

data[i]=edge
data[i+1]=edge
data[i+2]=edge

}

ctx.putImageData(imageData,0,0)

overlay.src=canvas.toDataURL()

}

let locked=false

function toggleLock(){

locked=!locked

if(locked){

overlay.style.position="fixed"

alert("Surface Locked")

}else{

alert("Unlocked")

}

}

function saveProject(){

let projects=JSON.parse(localStorage.getItem("savellProjects")||"[]")

projects.push({

img:overlay.src,
opacity:overlay.style.opacity,
posX,posY,scale,rotation,
date:Date.now()

})

localStorage.setItem("savellProjects",JSON.stringify(projects))

alert("Project Saved")

}

function showProjects(){

let projects=JSON.parse(localStorage.getItem("savellProjects")||"[]")

let list=""

projects.forEach((p,i)=>{

list+=`<div style="padding:5px;border-bottom:1px solid #ccc" onclick="openProject(${i})">Project ${i+1}</div>`

})

document.getElementById("projectList").innerHTML=list

}

function openProject(i){

let projects=JSON.parse(localStorage.getItem("savellProjects"))

let p=projects[i]

overlay.src=p.img

overlay.style.opacity=p.opacity

posX=p.posX
posY=p.posY
scale=p.scale
rotation=p.rotation

updateTransform()

}

</script>

</body>
</html>
