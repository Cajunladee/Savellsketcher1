<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Savell Sketches</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:sans-serif;
}

video{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
}

#overlay{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
touch-action:none;
}

#controls{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:rgba(255,255,255,0.85);
padding:12px;
border-radius:10px;
}

button{
margin:5px;
}

</style>
</head>

<body>

<video id="camera" autoplay playsinline></video>

<img id="overlay"/>

<div id="controls">

<input type="file" id="upload">

<br>

Opacity
<input type="range" id="opacity" min="0" max="1" step="0.01" value="0.5">

<br>

<button onclick="saveProject()">Save</button>
<button onclick="loadProject()">Load</button>

</div>

<script>

const video=document.getElementById("camera")
const overlay=document.getElementById("overlay")

navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
})
.then(stream=>{
video.srcObject=stream
})

document.getElementById("upload").onchange=e=>{
const file=e.target.files[0]
overlay.src=URL.createObjectURL(file)
}

document.getElementById("opacity").oninput=e=>{
overlay.style.opacity=e.target.value
}

let posX=0,posY=0,scale=1,rotation=0
let startX,startY
let initialDistance=0
let initialAngle=0

overlay.addEventListener("touchstart",e=>{

if(e.touches.length===1){

startX=e.touches[0].clientX-posX
startY=e.touches[0].clientY-posY

}

if(e.touches.length===2){

initialDistance=getDistance(e)
initialAngle=getAngle(e)

}

})

overlay.addEventListener("touchmove",e=>{

e.preventDefault()

if(e.touches.length===1){

posX=e.touches[0].clientX-startX
posY=e.touches[0].clientY-startY

}

if(e.touches.length===2){

let newDistance=getDistance(e)
scale*=newDistance/initialDistance
initialDistance=newDistance

let newAngle=getAngle(e)
rotation+=newAngle-initialAngle
initialAngle=newAngle

}

updateTransform()

})

function updateTransform(){

overlay.style.transform=
`translate(-50%,-50%)
translate(${posX}px,${posY}px)
scale(${scale})
rotate(${rotation}rad)`

}

function getDistance(e){

let dx=e.touches[0].clientX-e.touches[1].clientX
let dy=e.touches[0].clientY-e.touches[1].clientY

return Math.sqrt(dx*dx+dy*dy)

}

function getAngle(e){

let dx=e.touches[1].clientX-e.touches[0].clientX
let dy=e.touches[1].clientY-e.touches[0].clientY

return Math.atan2(dy,dx)

}

function saveProject(){

const data={
img:overlay.src,
opacity:overlay.style.opacity,
posX,posY,scale,rotation
}

localStorage.setItem("savellSketch",JSON.stringify(data))

alert("Project Saved")

}

function loadProject(){

const data=JSON.parse(localStorage.getItem("savellSketch"))

if(!data)return

overlay.src=data.img
overlay.style.opacity=data.opacity

posX=data.posX
posY=data.posY
scale=data.scale
rotation=data.rotation

updateTransform()

}

</script>

</body>
</html>
